<style>
/* =======================================================
   짠핏 jjan Fit — pastel, soft, playful-meets-serious
   ======================================================= */
:root{
  --blue-1:#6B9BD1;  --blue-2:#4A7FB8;
  --mint:#A8DADC;    --lavender:#C8B8E0;
  --cream:#FFF6E9;   --yellow:#FFD966;   --coral:#FF8B94;
  --income:#4A7FB8;   --income-soft:#E1ECF7;
  --expense:#E14B6A;  --expense-soft:#FCE0E5;
  --chest:#FFB4B4;  --back:#A3C9E8;  --legs:#FFD88B;
  --custom-1:#C7B3E8; --custom-2:#9FE4C4; --custom-3:#F4B8D6; --custom-4:#FFCBA4;
  --ink:#2D3142; --ink-2:#5A5F72; --ink-3:#8A8FA3;
  --line:#E6E8F0; --bg:#F3F1FA;
  --surface:rgba(255,255,255,.8); --surface-solid:#fff;
  --input-bg:#ffffff;
  --chip-bg:rgba(0,0,0,.04);
  --chip-bg-hover:rgba(0,0,0,.06);
  --grid-line:#E6E8F0;
  --radius-xl:28px; --radius-lg:20px; --radius:14px; --radius-sm:10px;
  --shadow-1:0 1px 2px rgba(45,49,66,.04), 0 4px 16px rgba(45,49,66,.06);
  --shadow-2:0 2px 4px rgba(45,49,66,.06), 0 12px 32px rgba(45,49,66,.10);
  --shadow-pop:0 10px 32px rgba(75,99,153,.22);
  --safe-bottom:env(safe-area-inset-bottom, 0px);
  --tabbar-h:68px;
}

html[data-theme="dark"]{
  --income-soft:rgba(74,127,184,.2);
  --expense-soft:rgba(225,75,106,.2);
  --ink:#F1F2F6; --ink-2:#BFC5D4; --ink-3:#7F8699;
  --line:#2C3040; --bg:#14151F;
  --surface:rgba(34,36,50,.85); --surface-solid:#222432;
  --input-bg:#2A2D3D;
  --chip-bg:rgba(255,255,255,.05);
  --chip-bg-hover:rgba(255,255,255,.08);
  --grid-line:#2C3040;
  --shadow-1:0 1px 2px rgba(0,0,0,.2), 0 4px 16px rgba(0,0,0,.25);
  --shadow-2:0 2px 4px rgba(0,0,0,.25), 0 12px 32px rgba(0,0,0,.35);
  --shadow-pop:0 10px 32px rgba(0,0,0,.5);
}

*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
  font-family:'Pretendard Variable','Pretendard',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  font-size:15px; -webkit-tap-highlight-color:transparent;
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
}
button{font-family:inherit;border:none;background:none;cursor:pointer;color:inherit;padding:0}
input{font-family:inherit;color:inherit}
input:focus,button:focus{outline:none}

body::before{
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background:
    radial-gradient(1000px 500px at 10% -10%, rgba(168,218,220,.5), transparent 60%),
    radial-gradient(800px 500px at 110% 110%, rgba(200,184,224,.4), transparent 60%),
    radial-gradient(600px 400px at 50% 50%, rgba(255,217,102,.15), transparent 70%);
  transition:opacity .3s;
}
html[data-theme="dark"] body::before{
  background:
    radial-gradient(1000px 500px at 10% -10%, rgba(74,127,184,.25), transparent 60%),
    radial-gradient(800px 500px at 110% 110%, rgba(122,91,191,.25), transparent 60%),
    radial-gradient(600px 400px at 50% 50%, rgba(255,180,180,.08), transparent 70%);
}
body::after{
  content:''; position:fixed; inset:0; pointer-events:none; z-index:1;
  opacity:.03;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence baseFrequency='.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='.9'/></svg>");
}
html[data-theme="dark"] body::after{ opacity:.08 }

#app{position:relative;z-index:2;max-width:560px;margin:0 auto;min-height:100vh;
  padding-bottom:calc(var(--tabbar-h) + var(--safe-bottom) + 16px);
}

/* ---------- header ---------- */
.hdr{display:flex;align-items:center;gap:12px;padding:18px 20px 12px}
.hdr .logo img{width:44px;height:44px;border-radius:12px;display:block;
  box-shadow:0 6px 16px rgba(107,155,209,.28);}
.hdr-txt{flex:1}
.hdr-txt .title{font-family:'Gaegu',cursive;font-size:24px;line-height:1;color:var(--ink)}
.hdr-txt .sub{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.15em;
  color:var(--ink-3);text-transform:uppercase;margin-top:2px}
.theme-toggle{width:40px;height:40px;border-radius:50%;
  background:var(--surface); border:1px solid rgba(255,255,255,.6);
  box-shadow:var(--shadow-1); display:flex;align-items:center;justify-content:center;
  font-size:18px;transition:.2s;flex:0 0 auto}
.theme-toggle:hover{transform:rotate(20deg);box-shadow:var(--shadow-2)}
html[data-theme="dark"] .theme-toggle{border-color:rgba(255,255,255,.08)}

/* ---------- views ---------- */
.main{padding:0 16px}
.view{display:none}
.view.active{display:block}

/* ---------- cards / surfaces ---------- */
.card,.stat,.chart-wrap,.day-panel,.set-section,.cal-card{
  background:var(--surface); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.6); border-radius:var(--radius-lg); box-shadow:var(--shadow-1);
}

/* ---------- summary grid ---------- */
.summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.stat{padding:14px 12px;text-align:left}
.stat .lbl{font-size:11px;color:var(--ink-3);font-weight:600;letter-spacing:.04em;margin-bottom:4px}
.stat .val{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;color:var(--ink);word-break:break-all}
.stat .val.in{color:var(--income)}
.stat .val.out{color:var(--expense)}
.stat .val.bal{color:var(--ink)}

/* ---------- period row ---------- */
.period-row{display:flex;gap:6px;margin-bottom:12px;padding:4px;background:var(--surface);
  border-radius:12px;box-shadow:var(--shadow-1);border:1px solid rgba(255,255,255,.6)}
.period-btn{flex:1;padding:8px;font-size:12px;font-weight:600;color:var(--ink-3);
  border-radius:8px;transition:.15s}
.period-btn.active{background:var(--blue-2);color:white}

/* ---------- chart ---------- */
.chart-wrap{padding:16px;position:relative;overflow:hidden}
.hdr-mini{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.now-val{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;color:var(--ink)}
.delta{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;padding:4px 10px;border-radius:8px}
.delta.up{background:var(--income-soft);color:var(--income)}
.delta.down{background:var(--expense-soft);color:var(--expense)}
.delta.flat{background:#F0F2F7;color:var(--ink-3)}
.chart-wrap svg.balance-chart{display:block;width:100%;height:220px}
.chart-wrap svg.vol-chart{display:block;width:100%;height:60px;margin-top:2px}
.chart-dates{display:flex;justify-content:space-between;font-size:10px;color:var(--ink-3);
  font-family:'JetBrains Mono',monospace;font-weight:600;margin-top:4px;padding:0 4px}
.chart-legend{display:flex;gap:14px;justify-content:center;font-size:11px;color:var(--ink-3);
  font-weight:600;margin-top:6px}
.chart-legend span{display:flex;align-items:center;gap:5px}
.chart-legend .dot{width:10px;height:10px;border-radius:50%;display:inline-block}
.chart-tip{position:absolute;background:rgba(45,49,66,.95);color:white;padding:8px 10px;
  border-radius:8px;font-size:11px;pointer-events:none;opacity:0;transition:.15s;z-index:5;
  font-family:'JetBrains Mono',monospace}
.chart-tip.show{opacity:1}
.chart-tip .t1{font-weight:700;margin-bottom:3px;font-size:10px;color:#C8B8E0}

/* selected point pinned info */
.chart-selected{background:var(--chip-bg);padding:10px 12px;border-radius:12px;
  margin-bottom:12px;display:none;align-items:center;gap:12px;flex-wrap:wrap}
.chart-selected.show{display:flex}
.chart-selected .sel-date{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:13px;color:var(--ink)}
.chart-selected .sel-in,.chart-selected .sel-out{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:13px}
.chart-selected .sel-in{color:var(--income)}
.chart-selected .sel-out{color:var(--expense)}
.chart-selected .sel-close{margin-left:auto;width:22px;height:22px;border-radius:50%;background:var(--chip-bg-hover);color:var(--ink-3);font-size:12px;display:flex;align-items:center;justify-content:center}

/* ---------- section title ---------- */
.section-title{display:flex;justify-content:space-between;align-items:center;padding:18px 4px 8px}
.section-title h2{margin:0;font-size:15px;font-weight:700;color:var(--ink)}
.muted{color:var(--ink-3);font-size:11px;font-weight:500}

/* ---------- tx list ---------- */
.tx-list{display:flex;flex-direction:column;gap:8px}
.tx{display:flex;align-items:center;gap:12px;padding:13px 14px;
  background:var(--surface);border:1px solid rgba(255,255,255,.6);
  border-radius:var(--radius);box-shadow:var(--shadow-1)}
.tx .tag{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;
  justify-content:center;font-size:16px;flex:0 0 auto}
.tx .tag.in{background:var(--income-soft);color:var(--income)}
.tx .tag.out{background:var(--expense-soft);color:var(--expense)}
.tx .tag.wo{background:#EEE5FA;color:#7A5BBF}
.tx .info{flex:1;min-width:0}
.tx .info .t1{font-size:13px;font-weight:600;color:var(--ink);line-height:1.3;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx .info .t2{font-size:11px;color:var(--ink-3);margin-top:2px;font-family:'JetBrains Mono',monospace}
.tx .amt{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;flex:0 0 auto;text-align:right}
.tx .amt.in{color:var(--income)}
.tx .amt.out{color:var(--expense)}
.empty{text-align:center;padding:36px 16px;color:var(--ink-3);font-size:13px}
.empty .emoji{font-size:36px;display:block;margin-bottom:8px}

.tx .row-actions{display:flex;gap:4px;flex:0 0 auto}
.tx .row-actions button{width:28px;height:28px;border-radius:8px;font-size:14px;
  color:var(--ink-3);background:transparent;display:flex;align-items:center;justify-content:center}
.tx .row-actions button:hover{background:var(--chip-bg-hover);color:var(--ink)}
.tx .row-actions .edit{color:var(--blue-2)}
.tx .row-actions .del{color:var(--expense)}

/* ---------- calendar switch tabs ---------- */
.cal-mode{display:flex;gap:6px;margin-bottom:12px;padding:4px;background:var(--surface);
  border-radius:12px;box-shadow:var(--shadow-1);border:1px solid rgba(255,255,255,.6)}
.cal-mode-btn{flex:1;padding:10px;font-size:13px;font-weight:700;color:var(--ink-3);
  border-radius:8px;transition:.15s;display:flex;align-items:center;justify-content:center;gap:5px}
.cal-mode-btn.active{background:var(--ink);color:white}
.cal-mode-btn.active.money{background:linear-gradient(135deg,var(--blue-2),#7A5BBF)}
.cal-mode-btn.active.workout{background:linear-gradient(135deg,#FFB4B4,#C7B3E8)}

/* ---------- month summary card (above calendar) ---------- */
.cal-topcard{padding:14px 16px;margin-bottom:12px}
.cal-topcard .label{font-size:11px;color:var(--ink-3);font-weight:600;letter-spacing:.04em;margin-bottom:8px}
.cal-topcard .money-totals{display:flex;gap:16px;margin-bottom:10px}
.cal-topcard .money-totals .tt{flex:1}
.cal-topcard .money-totals .tt .t{font-size:11px;color:var(--ink-3);font-weight:600}
.cal-topcard .money-totals .tt .v{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;margin-top:2px}
.cal-topcard .money-totals .tt .v.in{color:var(--income)}
.cal-topcard .money-totals .tt .v.out{color:var(--expense)}
.cal-topcard .compare{display:flex;flex-direction:column;gap:5px;padding-top:10px;
  border-top:1px dashed var(--line)}
.cal-topcard .compare .line{display:flex;justify-content:space-between;font-size:12px;color:var(--ink-2)}
.cal-topcard .compare .line .v{font-family:'JetBrains Mono',monospace;font-weight:700}
.cal-topcard .compare .up{color:var(--income)}
.cal-topcard .compare .down{color:var(--expense)}
.cal-topcard .wo-stats{display:flex;gap:12px}
.cal-topcard .wo-stats .wtile{flex:1}
.cal-topcard .wo-stats .wtile .t{font-size:11px;color:var(--ink-3);font-weight:600}
.cal-topcard .wo-stats .wtile .v{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;color:var(--ink);margin-top:2px}
.cal-topcard .wo-stats .wtile .sub{font-size:10px;color:var(--ink-3);margin-top:2px}

/* ---------- calendar ---------- */
.cal-hdr{display:flex;justify-content:space-between;align-items:center;padding:4px 4px 12px}
.cal-hdr .month{font-family:'Gaegu',cursive;font-size:22px;color:var(--ink)}
.cal-hdr .nav{display:flex;gap:4px}
.cal-hdr .nav button{width:32px;height:32px;border-radius:10px;font-size:16px;
  color:var(--ink-2);background:var(--surface-solid);border:1px solid var(--line);
  transition:.15s}
.cal-hdr .nav button:hover{background:var(--blue-2);color:white;border-color:var(--blue-2)}.cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;
  font-size:10px;font-weight:700;color:var(--ink-3);letter-spacing:.04em;
  padding:0 0 8px;border-bottom:1px solid var(--line);margin-bottom:6px}
.cal-weekdays span{padding:4px 0}
.cal-weekdays span:first-child{color:var(--expense)}
.cal-weekdays span:last-child{color:var(--blue-2)}

.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;
  background:var(--surface);padding:8px;border-radius:var(--radius-lg);
  border:1px solid rgba(255,255,255,.6);box-shadow:var(--shadow-1)}

/* MONEY CALENDAR — larger cells showing +/- totals */
.cal-grid.money .cell{min-height:72px;padding:6px 4px;border-radius:10px;
  display:flex;flex-direction:column;align-items:flex-start;position:relative;transition:.15s}
.cal-grid.money .cell.other{opacity:.3}
.cal-grid.money .cell.today{background:linear-gradient(135deg,rgba(107,155,209,.18),rgba(200,184,224,.18));
  border:1.5px solid var(--blue-2)}
.cal-grid.money .cell.selected{background:var(--blue-2);color:white}
.cal-grid.money .cell.selected .num{color:white}
.cal-grid.money .cell:hover:not(.selected){background:rgba(107,155,209,.08)}
.cal-grid.money .cell .num{font-size:12px;font-weight:700;color:var(--ink-2);line-height:1}
.cal-grid.money .cell .sun .num{color:var(--expense)}
.cal-grid.money .cell .amt-in{font-size:9px;color:var(--income);font-family:'JetBrains Mono',monospace;
  font-weight:700;margin-top:4px;line-height:1.2;word-break:break-all}
.cal-grid.money .cell .amt-out{font-size:9px;color:var(--expense);font-family:'JetBrains Mono',monospace;
  font-weight:700;line-height:1.2;word-break:break-all}
.cal-grid.money .cell.selected .amt-in{color:#C7E4FF}
.cal-grid.money .cell.selected .amt-out{color:#FFD0D8}

/* WORKOUT CALENDAR — dots for exercise types */
.cal-grid.workout .cell{min-height:60px;padding:6px 3px;border-radius:10px;
  display:flex;flex-direction:column;align-items:center;position:relative;transition:.15s}
.cal-grid.workout .cell.other{opacity:.3}
.cal-grid.workout .cell.today{background:linear-gradient(135deg,rgba(255,180,180,.25),rgba(199,179,232,.25));
  border:1.5px solid #C7B3E8}
.cal-grid.workout .cell.selected{background:#7A5BBF;color:white}
.cal-grid.workout .cell.selected .num{color:white}
.cal-grid.workout .cell:hover:not(.selected){background:rgba(199,179,232,.12)}
.cal-grid.workout .cell .num{font-size:13px;font-weight:700;color:var(--ink-2);line-height:1;margin-top:2px}
.cal-grid.workout .cell .wo-dots{display:flex;gap:3px;margin-top:6px;flex-wrap:wrap;justify-content:center}
.cal-grid.workout .cell .wo-dot{width:7px;height:7px;border-radius:50%}
.cal-grid.workout .cell .wo-more{font-size:8px;color:var(--ink-3);font-weight:700;font-family:'JetBrains Mono',monospace}
.cal-grid.workout .cell.selected .wo-more{color:white}

/* ---------- day panel ---------- */
.day-panel{margin-top:16px;padding:18px 16px 14px}
.day-panel h3{margin:0 0 4px;display:flex;align-items:baseline;gap:8px}
.day-panel h3 .dt{font-family:'Gaegu',cursive;font-size:20px;color:var(--ink)}
.day-panel h3 .dw{font-size:12px;color:var(--ink-3);font-weight:600}
.day-totals{display:flex;gap:12px;margin:10px 0 14px}
.day-totals .t{flex:1;padding:10px;background:rgba(255,255,255,.5);border-radius:10px}
.day-totals .t .lbl{font-size:10px;color:var(--ink-3);font-weight:700;margin-bottom:2px}
.day-totals .t .v{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700}
.day-totals .t.in .v{color:var(--income)}
.day-totals .t.out .v{color:var(--expense)}
.day-actions{display:flex;gap:6px;margin-bottom:14px}
.action-btn{flex:1;padding:11px 6px;border-radius:12px;font-size:13px;font-weight:700;
  display:flex;align-items:center;justify-content:center;gap:5px;transition:.15s;
  border:1px solid rgba(255,255,255,.7)}
.action-btn.in{background:var(--income-soft);color:var(--income)}
.action-btn.out{background:var(--expense-soft);color:var(--expense)}
.action-btn.wo{background:#EEE5FA;color:#7A5BBF}
.action-btn:hover{transform:translateY(-1px);box-shadow:0 6px 14px rgba(45,49,66,.08)}

/* ---------- workout view ---------- */
.wo-hero{padding:18px;background:linear-gradient(135deg,#FFF6E9 0%,#EEE5FA 100%);
  border-radius:var(--radius-lg);margin-bottom:14px;border:1px solid rgba(255,255,255,.6);box-shadow:var(--shadow-1)}
html[data-theme="dark"] .wo-hero{background:linear-gradient(135deg,#2A2740 0%,#3B2E4A 100%)}
.wo-hero .h-title{font-family:'Gaegu',cursive;font-size:22px;margin-bottom:4px}
.wo-hero .h-sub{font-size:12px;color:var(--ink-3);font-weight:600}
.wo-hero .h-big{font-family:'JetBrains Mono',monospace;font-size:36px;font-weight:700;
  color:#7A5BBF;margin:10px 0 2px;letter-spacing:-.02em}
html[data-theme="dark"] .wo-hero .h-big{color:#C8B8E0}
.wo-hero .h-mini{font-size:11px;color:var(--ink-3);font-weight:600}

/* weight tracker card */
.weight-card{padding:16px;margin-bottom:14px}
.weight-card .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.weight-card .top h2{margin:0;font-size:14px;font-weight:700;display:flex;align-items:center;gap:6px}
.weight-card .top .stat-now{text-align:right}
.weight-card .top .stat-now .lbl{font-size:10px;color:var(--ink-3);font-weight:700;letter-spacing:.04em}
.weight-card .top .stat-now .val{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:18px;color:var(--ink)}
.weight-card .top .stat-now .delta{font-size:10px;font-weight:700;font-family:'JetBrains Mono',monospace;margin-top:2px}
.weight-card .top .stat-now .delta.up{color:var(--expense)}
.weight-card .top .stat-now .delta.down{color:var(--income)}
.weight-card .input-row{display:flex;gap:6px;margin-bottom:14px}
.weight-card .input-row input{flex:1;padding:10px 12px;border-radius:10px;border:1px solid var(--line);
  background:var(--input-bg);font-size:14px;color:var(--ink);font-family:'JetBrains Mono',monospace;font-weight:700}
.weight-card .input-row input:focus{border-color:#7A5BBF}
.weight-card .input-row .unit{display:flex;align-items:center;padding:0 12px;font-size:12px;color:var(--ink-3);font-weight:700}
.weight-card .input-row button{padding:10px 16px;border-radius:10px;background:#7A5BBF;color:white;
  font-size:12px;font-weight:700}
.weight-card svg.weight-chart{display:block;width:100%;height:120px}
.weight-card .weight-date-labels{display:flex;justify-content:space-between;font-size:10px;
  color:var(--ink-3);font-family:'JetBrains Mono',monospace;font-weight:600;margin-top:4px;padding:0 4px}
.weight-card .empty-small{padding:16px;text-align:center;font-size:12px;color:var(--ink-3)}

.wo-chips{display:flex;gap:8px;overflow-x:auto;margin-bottom:14px;padding:2px;
  scrollbar-width:none}
.wo-chips::-webkit-scrollbar{display:none}
.wo-chip{padding:8px 14px;border-radius:999px;font-size:13px;font-weight:700;
  white-space:nowrap;background:var(--surface);border:1px solid rgba(255,255,255,.6);
  color:var(--ink-2);display:flex;align-items:center;gap:6px;box-shadow:var(--shadow-1);
  transition:.15s;flex:0 0 auto}
.wo-chip .dot{width:8px;height:8px;border-radius:50%}
.wo-chip.active{background:var(--ink);color:white}

.ex-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
.ex-card{padding:14px;border-radius:14px;background:var(--surface);
  border:1px solid rgba(255,255,255,.6);box-shadow:var(--shadow-1);text-align:left;
  display:flex;flex-direction:column;gap:4px;transition:.15s;min-height:82px}
.ex-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-2)}
.ex-card .cat{font-size:10px;font-weight:700;padding:2px 6px;border-radius:5px;
  display:inline-block;align-self:flex-start}
.ex-card .nm{font-size:14px;font-weight:700;color:var(--ink);line-height:1.25}
.ex-card .stat{font-size:10px;color:var(--ink-3);font-family:'JetBrains Mono',monospace;
  padding:0;background:transparent;border:none;box-shadow:none;margin-top:auto}

/* search box */
.search-row{position:relative;margin-bottom:10px}
.search-row input{width:100%;padding:12px 36px 12px 38px;border-radius:12px;
  border:1px solid var(--line);background:var(--input-bg);font-size:14px;color:var(--ink)}
.search-row input:focus{border-color:var(--blue-2)}
.search-row::before{content:'🔍';position:absolute;left:12px;top:50%;transform:translateY(-50%);
  font-size:14px;opacity:.6}
.search-row .clearBtn{position:absolute;right:8px;top:50%;transform:translateY(-50%);
  width:24px;height:24px;border-radius:50%;font-size:14px;color:var(--ink-3);
  display:none;align-items:center;justify-content:center}
.search-row .clearBtn.show{display:flex}

/* sessions list */
.sess{padding:14px;background:var(--surface);border:1px solid rgba(255,255,255,.6);
  border-radius:14px;box-shadow:var(--shadow-1);margin-bottom:8px}
.sess .hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:8px}
.sess .hdr .tt{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.sess .hdr .tt .cat-pill{font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;white-space:nowrap}
.sess .hdr .tt .nm{font-size:14px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sess .hdr .time{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-3)}
.sess .sets{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.sess .sets .chip{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;
  padding:4px 8px;background:var(--chip-bg);border-radius:6px;color:var(--ink-2)}
.sess .row-actions{display:flex;gap:6px}
.sess .row-actions button{padding:6px 10px;font-size:11px;font-weight:700;border-radius:8px}
.sess .row-actions .edit{background:var(--income-soft);color:var(--income)}
.sess .row-actions .del{background:var(--expense-soft);color:var(--expense)}

/* ---------- settings ---------- */
.set-section{margin-bottom:14px;padding:16px}
.set-section .hdr-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.set-section .hdr-row h2{margin:0;font-size:14px;font-weight:700;display:flex;align-items:center;gap:6px}
.set-section .em{font-size:16px}
.set-section .list .item{display:flex;align-items:center;gap:10px;padding:10px 0;
  border-bottom:1px dashed var(--line)}
.set-section .list .item:last-child{border-bottom:none}
.set-section .list .item.sub{padding-left:24px;padding-top:8px;padding-bottom:8px}
.set-section .dot{width:8px;height:8px;border-radius:50%;flex:0 0 auto}
.set-section .nm{flex:1;font-size:14px;font-weight:600}
.set-section .item-actions{display:flex;gap:4px;flex:0 0 auto}
.set-section .item-actions button{width:28px;height:28px;border-radius:8px;font-size:13px;
  color:var(--ink-3);background:transparent;display:flex;align-items:center;justify-content:center}
.set-section .item-actions button:hover{background:var(--chip-bg-hover)}
.set-section .item-actions .edit{color:var(--blue-2)}
.set-section .item-actions .del{color:var(--expense)}

.set-section .add-row{display:flex;gap:6px;margin-top:12px;padding-top:10px;border-top:1px dashed var(--line)}
.set-section .add-row input{flex:1;padding:9px 11px;border-radius:10px;border:1px solid var(--line);
  background:var(--input-bg);font-size:13px;color:var(--ink)}
.set-section .add-row button{padding:9px 14px;border-radius:10px;background:var(--blue-2);
  color:white;font-size:12px;font-weight:700}

/* color customizer */
.color-row{display:flex;gap:10px;align-items:center;padding:12px 0;border-bottom:1px dashed var(--line)}
.color-row:last-of-type{border-bottom:none}
.color-row .nm{flex:1;font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px}
.color-row input[type=color]{width:44px;height:32px;border:1px solid var(--line);
  border-radius:8px;background:none;padding:2px;cursor:pointer}
.color-row .hex{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-3);min-width:64px}
.color-row .restore{padding:6px 10px;font-size:11px;font-weight:700;border-radius:8px;
  background:var(--chip-bg);color:var(--ink-2)}

.danger-btn{margin-top:14px;padding:12px;border-radius:12px;width:100%;
  background:var(--expense-soft);color:var(--expense);font-weight:700;font-size:13px}

/* ---------- modal ---------- */
.modal-root{position:fixed;inset:0;z-index:100;display:none;pointer-events:none}
.modal-root.show{display:block;pointer-events:auto}
.modal-back{position:absolute;inset:0;background:rgba(45,49,66,.45);backdrop-filter:blur(4px);
  opacity:0;transition:.2s}
.modal-root.show .modal-back{opacity:1}
.modal-card{position:absolute;left:0;right:0;bottom:0;background:var(--surface-solid);
  border-top-left-radius:24px;border-top-right-radius:24px;padding:22px 20px 28px;
  max-width:560px;margin:0 auto;max-height:88vh;overflow-y:auto;
  transform:translateY(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);
  box-shadow:0 -20px 40px rgba(45,49,66,.2)}
.modal-root.show .modal-card{transform:translateY(0)}
.modal-card h3{margin:0 0 16px;font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px}
.modal-card h3 .em{font-size:20px}
.modal-card .field{margin-bottom:12px}
.modal-card .field label{display:block;font-size:11px;font-weight:700;color:var(--ink-3);
  letter-spacing:.04em;margin-bottom:6px}
.modal-card .field.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-card .field.row .col{margin:0}
.modal-card .field input{width:100%;padding:11px 13px;border-radius:10px;
  border:1px solid var(--line);background:var(--input-bg);font-size:14px;color:var(--ink)}
.modal-card .field input:focus{border-color:var(--blue-2)}
.primary-btn{width:100%;padding:13px;border-radius:12px;background:var(--ink);color:white;
  font-size:14px;font-weight:700;margin-top:8px;transition:.15s}
.primary-btn.in{background:linear-gradient(135deg,var(--blue-2),#7A5BBF);color:white}
.primary-btn.out{background:linear-gradient(135deg,#E14B6A,#FF8B94);color:white}
.primary-btn:disabled{opacity:.4;cursor:not-allowed}
.secondary-btn{width:100%;padding:12px;border-radius:12px;background:transparent;
  color:var(--ink-3);font-size:13px;font-weight:600;margin-top:6px}

.type-chips{display:flex;flex-wrap:wrap;gap:6px}
.type-chip{padding:8px 13px;border-radius:999px;font-size:12px;font-weight:600;
  background:var(--chip-bg);color:var(--ink-2);transition:.15s}
.type-chip.active{background:var(--ink);color:white}
.type-chip.add-chip{border:1.5px dashed var(--line);background:transparent;color:var(--ink-3)}

/* session modal */
.set-hdr{display:grid;grid-template-columns:50px 1fr 1fr 32px;gap:8px;font-size:10px;
  font-weight:700;color:var(--ink-3);text-transform:uppercase;letter-spacing:.04em;
  padding:0 2px 6px;border-bottom:1px solid var(--line);margin-bottom:8px}
.set-row{display:grid;grid-template-columns:50px 1fr 1fr 32px;gap:8px;align-items:center;margin-bottom:8px}
.set-row .sn{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;
  color:var(--blue-2);padding:0 6px}
.set-row input{padding:10px 10px;border-radius:10px;border:1px solid var(--line);
  background:var(--input-bg);font-size:13px;font-family:'JetBrains Mono',monospace;
  font-weight:700;color:var(--ink);text-align:center}
.set-row input:focus{border-color:var(--blue-2)}
.set-row .x{width:32px;height:32px;border-radius:8px;font-size:14px;color:var(--ink-3);
  opacity:.5;transition:.15s}
.set-row .x:hover{opacity:1;background:var(--expense-soft);color:var(--expense)}
.add-set{width:100%;padding:11px;border-radius:12px;font-size:13px;font-weight:700;
  color:var(--blue-2);background:var(--income-soft);border:1.5px dashed rgba(74,127,184,.4);margin-top:4px}

/* cat-pill for header */
.cat-pill{font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px}

/* ---------- toast ---------- */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);
  background:var(--ink);color:white;padding:10px 16px;border-radius:999px;font-size:13px;
  font-weight:600;z-index:200;transition:transform .25s;box-shadow:var(--shadow-pop)}
.toast.show{transform:translateX(-50%) translateY(0)}

/* ---------- tab bar ---------- */
.tabbar{position:fixed;bottom:0;left:0;right:0;height:var(--tabbar-h);
  padding-bottom:var(--safe-bottom);display:flex;z-index:50;
  background:rgba(255,255,255,.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--line);max-width:560px;margin:0 auto}
html[data-theme="dark"] .tabbar{background:rgba(20,21,31,.92)}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;font-size:10px;font-weight:700;color:var(--ink-3);transition:.15s;padding:6px 2px}
.tab-btn .ic{font-size:18px;transition:.15s}
.tab-btn.active{color:var(--blue-2)}
.tab-btn.active .ic{transform:scale(1.1)}

</style>

<body>

<div id="app">

  <!-- header -->
  <header class="hdr">
    <div class="logo"><img id="logoImg" alt="jjan Fit"/></div>

function loadState(){

    const parsed = JSON.parse(raw);
    const merged = Object.assign({}, DEFAULT_STATE, parsed);
    merged.settings = Object.assign({}, DEFAULT_STATE.settings, parsed.settings||{});
    merged.weights = Object.assign({}, parsed.weights||{});
    return merged;
  }catch(e){
    return JSON.parse(JSON.stringify(DEFAULT_STATE));
  }

  const a = Math.abs(n);
  const sign = n<0 ? '-' : '';
  if(a >= 100000000) return sign + '₩' + (a/100000000).toFixed(1).replace(/\.0$/,'') + '억';
  if(a >= 10000) return sign + '₩' + (a/10000).toFixed(1).replace(/\.0$/,'') + '만';
  return sign + '₩' + a.toLocaleString('ko-KR');
}
function fmtKRWTiny(n){
  // very short form for calendar cells
  if(n==null || n===0) return '';
  const a = Math.abs(n);
  if(a >= 10000000) return (a/10000000).toFixed(1).replace(/\.0$/,'') + '천만';
  if(a >= 10000)    return (a/10000).toFixed(a>=1000000?0:1).replace(/\.0$/,'') + '만';
  if(a >= 1000)     return (a/1000).toFixed(0) + '천';
  return a.toString();
}

/* =======================================================
   CHART VIEW — dual line (income blue / expense red)
   ======================================================= */
let currentRange = 30;
let selectedPointIdx = null;  // clicked point index (null = none)
document.querySelectorAll('.period-btn').forEach(b=>{
  b.addEventListener('click', ()=>{
    document.querySelectorAll('.period-btn').forEach(x=>x.classList.remove('active'));

    renderChart();

function renderChart(){
  const recs = state.records;
  const inColor  = state.settings.incomeColor  || DEFAULT_INCOME_COLOR;
  const outColor = state.settings.expenseColor || DEFAULT_EXPENSE_COLOR;

  // summary totals across all records
  let totalIn=0, totalOut=0;
  recs.forEach(r=>{
    if(r.kind==='income')  totalIn  += r.amount||0;
    if(r.kind==='expense') totalOut += r.amount||0;
  });
  document.getElementById('totalIn').textContent  = fmtKRW(totalIn);
  document.getElementById('totalOut').textContent = fmtKRW(totalOut);
  document.getElementById('totalBal').textContent = fmtKRW(totalIn-totalOut);

  // legend colored to match customization
  document.getElementById('chartLegend').innerHTML =
    `<span><span class="dot" style="background:${inColor}"></span>수입</span>` +
    `<span><span class="dot" style="background:${outColor}"></span>지출</span>`;

  // daily buckets
  const byDay = {};
  recs.forEach(r=>{
    if(r.kind==='workout') return;
    if(!byDay[r.date]) byDay[r.date] = {in:0,out:0};
    if(r.kind==='income')  byDay[r.date].in  += r.amount;
    if(r.kind==='expense') byDay[r.date].out += r.amount;
  });

  // build day axis — always a numeric range in days
  const days = [];
  const today = new Date();
  for(let i=currentRange-1; i>=0; i--){
    const d = new Date(today); d.setDate(d.getDate()-i);
    days.push(fmtDate(d));
  }

  // carry-over totals BEFORE the window start
  let startIn=0, startOut=0;
  if(days.length){
    const windowStart = days[0];
    recs.forEach(r=>{
      if(r.kind==='workout') return;
      if(r.date < windowStart){
        if(r.kind==='income')  startIn  += r.amount;
        if(r.kind==='expense') startOut += r.amount;
      }
    });
  }

  // cumulative series, two lines
  const series = [];
  let cumIn=startIn, cumOut=startOut;
  days.forEach(d=>{
    const v = byDay[d] || {in:0,out:0};
    cumIn += v.in; cumOut += v.out;
    series.push({date:d, in:v.in, out:v.out, cumIn, cumOut});
  });

  const svg = document.getElementById('balanceChart');
  const volSvg = document.getElementById('volChart');
  svg.innerHTML=''; volSvg.innerHTML='';

  const W=400, H=220, PADL=6, PADR=6, PADT=10, PADB=14;

  if(series.length===0){
    svg.innerHTML = `<text x="200" y="110" text-anchor="middle" font-size="14" fill="#8A8FA3" font-family="Pretendard">내역이 없습니다</text>`;
    document.getElementById('chartNow').textContent = '₩0';
    const dEl = document.getElementById('chartDelta');
    dEl.textContent = '—'; dEl.className = 'delta flat';
    document.getElementById('chartDates').innerHTML = '';
    document.getElementById('chartSelected').classList.remove('show');
    renderRecentList();
    return;
  }

  // shared scale based on both cumulative series
  let yMin = Math.min(startIn, startOut, ...series.map(s=>Math.min(s.cumIn, s.cumOut)));
  let yMax = Math.max(1, ...series.map(s=>Math.max(s.cumIn, s.cumOut)));
  if(yMin===yMax){ yMax = yMin+1; }
  const padY = (yMax-yMin)*0.12;
  yMin = Math.max(0, yMin - padY); yMax += padY;

  const x = i => PADL + (W-PADL-PADR) * (series.length===1 ? 0.5 : i/(series.length-1));
  const y = v => PADT + (H-PADT-PADB) * (1 - (v-yMin)/(yMax-yMin));

  const gInId  = 'gi_' + Math.random().toString(36).slice(2,6);
  const gOutId = 'go_' + Math.random().toString(36).slice(2,6);
  const defs = `
    <defs>
      <linearGradient id="${gInId}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${inColor}" stop-opacity=".28"/>
        <stop offset="100%" stop-color="${inColor}" stop-opacity="0"/>
      </linearGradient>
      <linearGradient id="${gOutId}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${outColor}" stop-opacity=".28"/>
        <stop offset="100%" stop-color="${outColor}" stop-opacity="0"/>
      </linearGradient>
    </defs>`;

  let grid = '';
  for(let i=1;i<=3;i++){
    const gy = PADT + (H-PADT-PADB)*(i/4);
    grid += `<line x1="${PADL}" y1="${gy}" x2="${W-PADR}" y2="${gy}" stroke="#E6E8F0" stroke-width="1" stroke-dasharray="2 4" opacity=".6"/>`;
  }

  function smoothPath(pts){
    if(!pts.length) return '';
    if(pts.length===1) return `M ${pts[0][0]} ${pts[0][1]}`;
    let d = `M ${pts[0][0]} ${pts[0][1]}`;
    for(let i=1;i<pts.length;i++){
      const p0=pts[i-1], p1=pts[i];
      const mx = (p0[0]+p1[0])/2;
      d += ` C ${mx} ${p0[1]}, ${mx} ${p1[1]}, ${p1[0]} ${p1[1]}`;
    }
    return d;
  }

  const inPts  = series.map((s,i)=>[x(i), y(s.cumIn)]);
  const outPts = series.map((s,i)=>[x(i), y(s.cumOut)]);
  const dIn  = smoothPath(inPts);
  const dOut = smoothPath(outPts);
  const baseY = H-PADB;
  const dInArea  = dIn  + ` L ${inPts[inPts.length-1][0]}  ${baseY} L ${inPts[0][0]}  ${baseY} Z`;
  const dOutArea = dOut + ` L ${outPts[outPts.length-1][0]} ${baseY} L ${outPts[0][0]} ${baseY} Z`;

  // endpoint dots
  let dots = '';
  if(series.length <= 60){
    series.forEach((s,i)=>{
      const px=x(i);
      dots += `<circle cx="${px}" cy="${y(s.cumIn)}"  r="2" fill="#fff" stroke="${inColor}"  stroke-width="1.5"/>`;
      dots += `<circle cx="${px}" cy="${y(s.cumOut)}" r="2" fill="#fff" stroke="${outColor}" stroke-width="1.5"/>`;
    });
  }
  const lastIn  = inPts[inPts.length-1];
  const lastOut = outPts[outPts.length-1];
  dots += `<circle cx="${lastIn[0]}"  cy="${lastIn[1]}"  r="5" fill="${inColor}"/>`;
  dots += `<circle cx="${lastIn[0]}"  cy="${lastIn[1]}"  r="9" fill="${inColor}"  opacity=".2"/>`;
  dots += `<circle cx="${lastOut[0]}" cy="${lastOut[1]}" r="5" fill="${outColor}"/>`;
  dots += `<circle cx="${lastOut[0]}" cy="${lastOut[1]}" r="9" fill="${outColor}" opacity=".2"/>`;

  // click hitboxes (bigger than hover for touch targets)
  let hitboxes = '';
  series.forEach((s,i)=>{
    const px = x(i);
    const cellW = (W-PADL-PADR)/Math.max(series.length,1);
    hitboxes += `<rect data-i="${i}" x="${px-cellW/2}" y="0" width="${cellW}" height="${H}" fill="transparent" style="cursor:pointer"/>`;
  });

  // highlight selected point if any
  let highlight = '';
  if(selectedPointIdx != null && selectedPointIdx < series.length){
    const si = selectedPointIdx;
    const s = series[si];
    highlight = `
      <line x1="${x(si)}" y1="${PADT}" x2="${x(si)}" y2="${H-PADB}" stroke="var(--ink-3)" stroke-width="1" stroke-dasharray="3 3" opacity=".4"/>
      <circle cx="${x(si)}" cy="${y(s.cumIn)}"  r="7" fill="${inColor}"  opacity=".35"/>
      <circle cx="${x(si)}" cy="${y(s.cumOut)}" r="7" fill="${outColor}" opacity=".35"/>
      <circle cx="${x(si)}" cy="${y(s.cumIn)}"  r="4" fill="${inColor}"/>
      <circle cx="${x(si)}" cy="${y(s.cumOut)}" r="4" fill="${outColor}"/>`;
  }

  svg.innerHTML = defs + grid +
    `<path d="${dOutArea}" fill="url(#${gOutId})"/>` +
    `<path d="${dInArea}"  fill="url(#${gInId})"/>`  +
    `<path d="${dOut}" fill="none" stroke="${outColor}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>` +
    `<path d="${dIn}"  fill="none" stroke="${inColor}"  stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>` +
    dots + highlight + hitboxes;

  // start/end date labels under the chart
  const datesEl = document.getElementById('chartDates');
  if(series.length >= 2){
    const [y1,m1,d1] = series[0].date.split('-');
    const [y2,m2,d2] = series[series.length-1].date.split('-');
    datesEl.innerHTML = `<span>${y1}.${m1}.${d1}</span><span>${y2}.${m2}.${d2}</span>`;
  } else if(series.length === 1){
    const [yy,mm,dd] = series[0].date.split('-');
    datesEl.innerHTML = `<span>${yy}.${mm}.${dd}</span><span></span>`;
  } else {
    datesEl.innerHTML = '';
  }

  // volume bars
  const maxVol = Math.max(1, ...series.map(s=>Math.max(s.in, s.out)));
  const VW=400, VH=60;
  const xv = i => PADL + (VW-PADL-PADR) * (series.length===1 ? 0.5 : i/(series.length-1));
  const cellW = (VW-PADL-PADR)/Math.max(series.length,1);
  const barW = Math.max(1.5, Math.min(cellW*0.35, 6));
  let vols = '';
  series.forEach((s,i)=>{
    const cx = xv(i);
    if(s.in>0){
      const h = (s.in/maxVol)*(VH*0.9);
      vols += `<rect x="${cx-barW-1}" y="${VH-h}" width="${barW}" height="${h}" fill="${inColor}" rx="1.5"/>`;
    }
    if(s.out>0){
      const h = (s.out/maxVol)*(VH*0.9);
      vols += `<rect x="${cx+1}" y="${VH-h}" width="${barW}" height="${h}" fill="${outColor}" rx="1.5"/>`;
    }
  });
  volSvg.innerHTML = vols;

  // click → pin selected point info at top; click again / outside to clear
  const selBox = document.getElementById('chartSelected');
  function renderSelected(){
    if(selectedPointIdx == null || selectedPointIdx >= series.length){
      selBox.classList.remove('show');
      selBox.innerHTML = '';
      return;
    }
    const s = series[selectedPointIdx];
    const [yy,mm,dd] = s.date.split('-');
    selBox.innerHTML = `
      <span class="sel-date">${yy}.${mm}.${dd}</span>
      <span class="sel-in">+${fmtKRW(s.in)} <span style="color:var(--ink-3);font-weight:500;font-size:10px">(누적 ${fmtKRWShort(s.cumIn)})</span></span>
      <span class="sel-out">-${fmtKRW(s.out)} <span style="color:var(--ink-3);font-weight:500;font-size:10px">(누적 ${fmtKRWShort(s.cumOut)})</span></span>
      <button class="sel-close" id="selClose" title="닫기">×</button>`;
    selBox.classList.add('show');
    document.getElementById('selClose').addEventListener('click', e=>{
      e.stopPropagation();
      selectedPointIdx = null;
      renderChart();
    });
  }
  renderSelected();

  svg.querySelectorAll('rect[data-i]').forEach(rect=>{
    rect.addEventListener('click', e=>{
      e.stopPropagation();
      const i = Number(rect.dataset.i);
      selectedPointIdx = (selectedPointIdx === i) ? null : i;
      renderChart();
    });
  });

  // header: show current balance + delta within window
  const last = series[series.length-1];
  const bal = last.cumIn - last.cumOut;
  const startBal = startIn - startOut;
  const delta = bal - startBal;
  document.getElementById('chartNow').textContent = fmtKRW(bal);
  const dEl = document.getElementById('chartDelta');
  if(delta>0){ dEl.textContent = '▲ '+fmtKRWShort(delta); dEl.className = 'delta up'; }
  else if(delta<0){ dEl.textContent = '▼ '+fmtKRWShort(delta); dEl.className = 'delta down'; }
  else { dEl.textContent = '— 변동없음'; dEl.className = 'delta flat'; }

  renderRecentList();
}

function renderRecentList(){
  // RECENT list excludes workout records per spec — money only
  const listEl = document.getElementById('recentList');
  const recent = state.records
    .filter(r => r.kind==='income' || r.kind==='expense')
    .sort((a,b)=>{
      const A = a.date+'T'+(a.time||'00:00');
      const B = b.date+'T'+(b.time||'00:00');
      return B.localeCompare(A);
    }).slice(0,10);
  if(recent.length===0){
    listEl.innerHTML = `<div class="empty"><span class="emoji">✨</span>기록이 없어요.<br>달력에서 오늘 날짜를 눌러 시작해 보세요!</div>`;
  } else {
    listEl.innerHTML = recent.map(r=>txRowHTML(r)).join('');
  }
}

function txRowHTML(r){
  const [, m, d] = r.date.split('-');
  const dateLbl = `${m}.${d}`;
  if(r.kind==='income'){
    const tn = findById(state.incomeTypes, r.typeId)?.name || '?';
    return `<div class="tx"><div class="tag in">💰</div>
      <div class="info"><div class="t1">${escapeHtml(tn)}</div><div class="t2">${dateLbl} · ${r.time||''}</div></div>
      <div class="amt in">+${fmtKRW(r.amount)}</div></div>`;
  }
  if(r.kind==='expense'){
    const tn = findById(state.expenseTypes, r.typeId)?.name || '?';
    return `<div class="tx"><div class="tag out">💳</div>
      <div class="info"><div class="t1">${escapeHtml(tn)}</div><div class="t2">${dateLbl} · ${r.time||''}</div></div>
      <div class="amt out">-${fmtKRW(r.amount)}</div></div>`;
  }
  if(r.kind==='workout'){
    const cat = findById(state.workoutCats, r.categoryId);
    const ex  = cat?.exercises.find(e=>e.id===r.exerciseId);
    const totalSets = (r.sets||[]).length;
    const vol = (r.sets||[]).reduce((a,s)=>a + (+s.w||0)*(+s.r||0), 0);
    return `<div class="tx"><div class="tag wo">💪</div>` +
      `<div class="info"><div class="t1">${escapeHtml(ex?.name||'운동')} · <span class="muted" style="font-weight:500">${escapeHtml(cat?.name||'')}</span></div>` +
      `<div class="t2">${dateLbl} · ${r.time||''}</div></div>` +
      `<div class="amt" style="color:#7a5bbf;font-size:12px;text-align:right;line-height:1.35">${totalSets}세트<br><span style="font-size:10px;color:var(--ink-3);font-weight:500">${vol.toLocaleString()}kg·rep</span></div></div>`;
  }
  return '';
}

/* =======================================================
   CALENDAR VIEW — two modes: money / workout
   ======================================================= */
let calYear, calMonth;     // 0-indexed month
let selectedDate;
let calMode = 'money';      // 'money' | 'workout'

function initCalendar(){
  const n = new Date();
  calYear = n.getFullYear();
  calMonth = n.getMonth();
  selectedDate = todayStr();
}
initCalendar();

document.getElementById('prevMonth').addEventListener('click', ()=>{
  calMonth--; if(calMonth<0){ calMonth=11; calYear--; }
  renderCalendar();
});
document.getElementById('nextMonth').addEventListener('click', ()=>{
  calMonth++; if(calMonth>11){ calMonth=0; calYear++; }
  renderCalendar();
});
document.getElementById('todayBtn').addEventListener('click', ()=>{
  initCalendar(); renderCalendar();
});

document.querySelectorAll('.cal-mode-btn').forEach(b=>{
  b.addEventListener('click', ()=>{
    document.querySelectorAll('.cal-mode-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    calMode = b.dataset.mode;
    renderCalendar();
    renderDayPanel();
  });
});

function renderCalendar(){
  const grid = document.getElementById('calGrid');
  grid.className = 'cal-grid ' + calMode;
  grid.innerHTML = '';

  document.getElementById('calMonth').textContent = `${calYear}년 ${calMonth+1}월`;

  // first day's day-of-week and days in month
  const firstDow = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const prevMonthDays = new Date(calYear, calMonth, 0).getDate();

  // index records by date for fast lookup
  const byDate = {};
  state.records.forEach(r=>{
    if(!byDate[r.date]) byDate[r.date] = [];
    byDate[r.date].push(r);
  });

  const todayS = todayStr();

  // leading blanks (show prev month dimmed)
  for(let i=firstDow-1; i>=0; i--){
    const day = prevMonthDays - i;
    const cell = document.createElement('div');
    cell.className = 'cell other';
    cell.innerHTML = `<div class="num">${day}</div>`;
    grid.appendChild(cell);
  }
  // main
  for(let day=1; day<=daysInMonth; day++){
    const dateS = `${calYear}-${pad(calMonth+1)}-${pad(day)}`;
    const dow = new Date(calYear, calMonth, day).getDay();
    const recs = byDate[dateS] || [];
    const cell = document.createElement('div');
    cell.className = 'cell';
    if(dateS===todayS) cell.classList.add('today');
    if(dateS===selectedDate) cell.classList.add('selected');
    if(dow===0) cell.classList.add('sun');

    if(calMode==='money'){
      const sumIn  = recs.filter(r=>r.kind==='income').reduce((a,r)=>a+r.amount,0);
      const sumOut = recs.filter(r=>r.kind==='expense').reduce((a,r)=>a+r.amount,0);
      cell.innerHTML = `<div class="num" style="${dow===0?'color:var(--expense)':''}${dow===6?'color:var(--blue-2)':''}">${day}</div>
        ${sumIn>0  ? `<div class="amt-in">+${fmtKRWTiny(sumIn)}</div>`  : ''}
        ${sumOut>0 ? `<div class="amt-out">-${fmtKRWTiny(sumOut)}</div>` : ''}`;
    } else {
      // workout calendar — colored dots per category
      const workouts = recs.filter(r=>r.kind==='workout');
      const catIds = [...new Set(workouts.map(r=>r.categoryId))];
      const dotsMax = 4;
      const shown = catIds.slice(0, dotsMax);
      const dotsHTML = shown.map(cid=>{
        const c = findById(state.workoutCats, cid);
        return `<div class="wo-dot" style="background:${c?.color||'#888'}"></div>`;
      }).join('');
      const moreHTML = catIds.length > dotsMax ? `<div class="wo-more">+${catIds.length-dotsMax}</div>` : '';
      cell.innerHTML = `<div class="num" style="${dow===0?'color:var(--expense)':''}${dow===6?'color:var(--blue-2)':''}">${day}</div>
        <div class="wo-dots">${dotsHTML}${moreHTML}</div>`;
    }

    cell.addEventListener('click', ()=>{
      selectedDate = dateS;
      renderCalendar();
      renderDayPanel();
      // scroll day panel into view
      setTimeout(()=>document.getElementById('dayPanel').scrollIntoView({behavior:'smooth', block:'start'}), 60);
    });
    grid.appendChild(cell);
  }

  // trailing blanks
  const totalCells = firstDow + daysInMonth;
  const trail = (7 - (totalCells % 7)) % 7;
  for(let i=1; i<=trail; i++){
    const cell = document.createElement('div');
    cell.className = 'cell other';
    cell.innerHTML = `<div class="num">${i}</div>`;
    grid.appendChild(cell);
  }

  renderCalTopcard();
  renderDayPanel();
}

function renderCalTopcard(){
  const card = document.getElementById('calTopcard');

  // month-start / month-end strings
  const mStart = `${calYear}-${pad(calMonth+1)}-01`;
  const mEnd   = `${calYear}-${pad(calMonth+1)}-${pad(new Date(calYear, calMonth+1, 0).getDate())}`;

  // previous month range
  const prevY = calMonth===0 ? calYear-1 : calYear;
  const prevM = calMonth===0 ? 11 : calMonth-1;
  const pmStart = `${prevY}-${pad(prevM+1)}-01`;
  const pmEnd   = `${prevY}-${pad(prevM+1)}-${pad(new Date(prevY, prevM+1, 0).getDate())}`;

  if(calMode==='money'){
    // current month totals
    let curIn=0, curOut=0, prevIn=0, prevOut=0;
    state.records.forEach(r=>{
      if(r.kind!=='income' && r.kind!=='expense') return;
      if(r.date>=mStart && r.date<=mEnd){
        if(r.kind==='income')  curIn  += r.amount;
        else                   curOut += r.amount;
      }
      if(r.date>=pmStart && r.date<=pmEnd){
        if(r.kind==='income')  prevIn  += r.amount;
        else                   prevOut += r.amount;
      }
    });

    const dIn  = curIn  - prevIn;   // +: earned more
    const dOut = curOut - prevOut;  // -: spent less

    const inLine = dIn===0
      ? `<span>전월과 동일 <span class="v">—</span></span>`
      : dIn>0
        ? `<span>지난 달보다 <span class="v up">${fmtKRWShort(dIn)} 더 벌었어요</span> 🙂</span>`
        : `<span>지난 달보다 <span class="v down">${fmtKRWShort(-dIn)} 덜 벌었어요</span></span>`;
    const outLine = dOut===0
      ? `<span>전월과 동일 <span class="v">—</span></span>`
      : dOut<0
        ? `<span>지난 달보다 <span class="v up">${fmtKRWShort(-dOut)} 덜 썼어요</span> 👍</span>`
        : `<span>지난 달보다 <span class="v down">${fmtKRWShort(dOut)} 더 썼어요</span></span>`;

    card.innerHTML = `
      <div class="label">${calYear}년 ${calMonth+1}월 · 수입/지출</div>
      <div class="money-totals">
        <div class="tt"><div class="t">수입</div><div class="v in">+${fmtKRW(curIn)}</div></div>
        <div class="tt"><div class="t">지출</div><div class="v out">-${fmtKRW(curOut)}</div></div>
        <div class="tt"><div class="t">잔액</div><div class="v">${fmtKRW(curIn-curOut)}</div></div>
      </div>
      <div class="compare">
        <div class="line">💰 ${inLine}</div>
        <div class="line">💳 ${outLine}</div>
      </div>`;
  } else {
    // workout calendar: count workout days this month + most-done exercise
    const workouts = state.records.filter(r=>r.kind==='workout' && r.date>=mStart && r.date<=mEnd);
    const days = new Set(workouts.map(r=>r.date));
    const exCount = {};
    workouts.forEach(r=>{ exCount[r.exerciseId] = (exCount[r.exerciseId]||0) + 1; });
    let topEx=null, topCount=0;
    Object.keys(exCount).forEach(eid=>{ if(exCount[eid]>topCount){ topEx=eid; topCount=exCount[eid]; } });
    let topExName='—', topCatName='';
    if(topEx){
      for(const c of state.workoutCats){
        const ex = c.exercises.find(e=>e.id===topEx);
        if(ex){ topExName = ex.name; topCatName = c.name; break; }
      }
    }

    // category distribution
    const catCount = {};
    workouts.forEach(r=>{ catCount[r.categoryId] = (catCount[r.categoryId]||0) + 1; });
    const catRows = Object.keys(catCount)
      .sort((a,b)=>catCount[b]-catCount[a])
      .slice(0,3)
      .map(cid=>{
        const c = findById(state.workoutCats, cid);
        return `<span style="display:inline-flex;align-items:center;gap:4px;padding:3px 8px;background:${c?.color||'#888'}33;border-radius:999px;font-size:11px;font-weight:700;color:var(--ink)"><span style="width:6px;height:6px;border-radius:50%;background:${c?.color||'#888'}"></span>${escapeHtml(c?.name||'?')} ${catCount[cid]}회</span>`;
      }).join(' ');

    card.innerHTML = `
      <div class="label">${calYear}년 ${calMonth+1}월 · 운동</div>
      <div class="wo-stats">
        <div class="wtile"><div class="t">운동 일수</div><div class="v">${days.size}일</div><div class="sub">총 ${workouts.length}회 세션</div></div>
        <div class="wtile"><div class="t">가장 많이 한 운동</div><div class="v" style="font-size:14px">${escapeHtml(topExName)}</div><div class="sub">${topCatName?escapeHtml(topCatName)+' · ':''}${topCount||0}회</div></div>
      </div>
      ${catRows ? `<div style="margin-top:10px;padding-top:10px;border-top:1px dashed var(--line);display:flex;flex-wrap:wrap;gap:6px">${catRows}</div>` : ''}`;
  }
}

function renderDayPanel(){
  const [y,m,d] = selectedDate.split('-');
  document.getElementById('dayDate').textContent = `${y}.${m}.${d}`;
  const dow = new Date(+y,+m-1,+d).getDay();
  document.getElementById('dayDow').textContent = dowKor[dow] + '요일';

  // filter records by calendar mode
  const allDayRecs = state.records.filter(r=>r.date===selectedDate);
  const recs = calMode==='workout'
    ? allDayRecs.filter(r=>r.kind==='workout')
    : allDayRecs.filter(r=>r.kind==='income' || r.kind==='expense');
  recs.sort((a,b)=>(b.time||'').localeCompare(a.time||''));

  // totals area — hide money totals on workout calendar
  const totalsEl = document.getElementById('dayTotals');
  const actionsEl = document.getElementById('dayActions');
  if(calMode==='workout'){
    // in workout mode, replace totals with workout-day stat
    const sessCount = recs.length;
    const totalSets = recs.reduce((a,r)=>a+(r.sets?.length||0),0);
    totalsEl.innerHTML = `
      <div class="t" style="background:rgba(199,179,232,.25)"><div class="lbl">오늘 세션</div><div class="v" style="color:#7A5BBF">${sessCount}개</div></div>
      <div class="t" style="background:rgba(199,179,232,.25)"><div class="lbl">총 세트</div><div class="v" style="color:#7A5BBF">${totalSets}</div></div>`;
    actionsEl.innerHTML = `<button class="action-btn wo" data-act="workout" style="flex:1">💪 운동 시작</button>`;
  } else {
    let sumIn=0,sumOut=0;
    recs.forEach(r=>{ if(r.kind==='income') sumIn+=r.amount; if(r.kind==='expense') sumOut+=r.amount; });
    totalsEl.innerHTML = `
      <div class="t in"><div class="lbl">수입</div><div class="v">${fmtKRW(sumIn)}</div></div>
      <div class="t out"><div class="lbl">지출</div><div class="v">${fmtKRW(sumOut)}</div></div>`;
    actionsEl.innerHTML = `
      <button class="action-btn in" data-act="income">💰 수입</button>
      <button class="action-btn out" data-act="expense">💳 지출</button>`;
  }
  // re-wire action buttons since we replaced HTML
  actionsEl.querySelectorAll('.action-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const act = btn.dataset.act;
      if(act==='income')  openMoneyModal('income');
      if(act==='expense') openMoneyModal('expense');
      if(act==='workout') openWorkoutPicker();
    });
  });

  const list = document.getElementById('dayList');
  if(recs.length===0){
    const emptyMsg = calMode==='workout'
      ? '운동 기록이 없어요.<br>위 버튼으로 오늘 운동을 추가해 보세요.'
      : '기록이 없어요.<br>위 버튼으로 수입/지출을 추가해 보세요.';
    list.innerHTML = `<div class="empty" style="padding:18px"><span class="emoji">🌿</span>${emptyMsg}</div>`;
    return;
  }
  list.innerHTML = recs.map(r=>{
    const row = txRowHTML(r);
    const actions = `<div class="row-actions"><button class="edit" data-edit="${r.id}" title="수정">✎</button><button class="del" data-del="${r.id}" title="삭제">×</button></div>`;
    const cut = row.lastIndexOf('</div>');
    return row.slice(0, cut) + actions + row.slice(cut);
  }).join('');

  list.querySelectorAll('button[data-del]').forEach(b=>{
    b.addEventListener('click', e=>{
      e.stopPropagation();
      if(!confirm('이 기록을 삭제할까요?')) return;
      state.records = state.records.filter(x=>x.id!==b.dataset.del);
      saveState(); renderDayPanel(); renderCalendar(); renderChart();
      toast('삭제 완료');
    });
  });
  list.querySelectorAll('button[data-edit]').forEach(b=>{
    b.addEventListener('click', e=>{
      e.stopPropagation();
      const r = state.records.find(x=>x.id===b.dataset.edit);
      if(!r) return;
      if(r.kind==='income')  openMoneyModal('income',  r.id);
      else if(r.kind==='expense') openMoneyModal('expense', r.id);
      else if(r.kind==='workout') openSessionModal(r.categoryId, r.exerciseId, r.id);
    });
  });
}

/* =======================================================
   MONEY MODAL (income / expense) — supports EDIT
   ======================================================= */
function openMoneyModal(kind, existingId=null){
  const typesKey = kind==='income' ? 'incomeTypes' : 'expenseTypes';
  const color = kind==='income' ? 'in' : 'out';
  const emoji = kind==='income' ? '💰' : '💳';
  const isEdit = !!existingId;
  const title = isEdit
    ? (kind==='income' ? '수입 수정' : '지출 수정')
    : (kind==='income' ? '수입 추가' : '지출 추가');

  let defDate=selectedDate, defTime=fmtTime(new Date()), defAmount='', initialTypeId=null;
  if(isEdit){
    const r = state.records.find(x=>x.id===existingId);
    if(!r){ toast('기록을 찾을 수 없습니다'); return; }
    defDate = r.date;
    defTime = r.time || fmtTime(new Date());
    defAmount = r.amount ? Number(r.amount).toLocaleString('ko-KR') : '';
    initialTypeId = r.typeId || null;
  }

  const html = `
    <h3><span class="em">${emoji}</span>${title}</h3>
    <div class="field row">
      <div class="col"><label>날짜</label><input type="date" id="mDate" value="${defDate}"/></div>
      <div class="col"><label>시간</label><input type="time" id="mTime" value="${defTime}"/></div>
    </div>
    <div class="field">
      <label>종류 <span style="font-weight:500;color:var(--ink-3)">(길게 눌러 삭제)</span></label>
      <div class="type-chips" id="typeChips"></div>
    </div>
    <div class="field">
      <label>금액 (원)</label>
      <input type="text" inputmode="numeric" id="mAmount" placeholder="0" autocomplete="off" value="${defAmount}"/>
    </div>
    <button class="primary-btn ${color}" id="mSave" disabled>${isEdit?'수정하기':'저장하기'}</button>
    <button class="secondary-btn" onclick="closeModal()">취소</button>
  `;
  openModal(html);

  const chipsEl = document.getElementById('typeChips');
  let selectedTypeId = initialTypeId;
  function renderChips(){
    const types = state[typesKey];
    chipsEl.innerHTML = types.map(t=>
      `<button class="type-chip ${selectedTypeId===t.id?'active':''}" data-id="${t.id}">${escapeHtml(t.name)}</button>`
    ).join('') + `<button class="type-chip add-chip" id="addType">+ 추가</button>`;

    chipsEl.querySelectorAll('.type-chip').forEach(b=>{
      if(b.id==='addType'){
        b.addEventListener('click', ()=>{
          const nm = prompt((kind==='income'?'수입':'지출') + ' 종류 이름을 입력하세요');
          if(nm && nm.trim()){
            state[typesKey].push({id:uid('t_'), name:nm.trim()});
            saveState(); renderChips();
            toast('종류 추가됨');
          }
        });
      } else {
        b.addEventListener('click', ()=>{
          selectedTypeId = b.dataset.id;
          renderChips(); updateCanSave();
        });
        let pressTimer;
        b.addEventListener('touchstart', ()=>{ pressTimer = setTimeout(()=>offerDelete(b.dataset.id), 500); });
        b.addEventListener('touchend', ()=>clearTimeout(pressTimer));
        b.addEventListener('touchmove', ()=>clearTimeout(pressTimer));
        b.addEventListener('contextmenu', e=>{ e.preventDefault(); offerDelete(b.dataset.id); });
      }
    });
  }
  function offerDelete(id){
    const t = findById(state[typesKey], id);
    if(!t) return;
    if(confirm(`"${t.name}" 종류를 삭제할까요?\n(기존 기록은 유지되지만 이름이 빠집니다)`)){
      state[typesKey] = state[typesKey].filter(x=>x.id!==id);
      if(selectedTypeId===id) selectedTypeId = null;
      saveState(); renderChips(); updateCanSave();
      toast('삭제됨');
    }
  }
  renderChips();

  const amtEl = document.getElementById('mAmount');
  amtEl.addEventListener('input', ()=>{
    const digits = amtEl.value.replace(/[^\d]/g, '');
    amtEl.value = digits ? Number(digits).toLocaleString('ko-KR') : '';
    updateCanSave();
  });
  function updateCanSave(){
    const amt = Number(amtEl.value.replace(/[^\d]/g,''));
    document.getElementById('mSave').disabled = !(selectedTypeId && amt>0);
  }
  updateCanSave();

  document.getElementById('mSave').addEventListener('click', ()=>{
    const date = document.getElementById('mDate').value;
    const time = document.getElementById('mTime').value;
    const amt  = Number(amtEl.value.replace(/[^\d]/g,''));
    if(!selectedTypeId || !(amt>0)) return;
    if(isEdit){
      const r = state.records.find(x=>x.id===existingId);
      r.date = date; r.time = time; r.typeId = selectedTypeId; r.amount = amt;
    } else {
      state.records.push({id:uid('r_'), kind, date, time, typeId:selectedTypeId, amount:amt});
    }
    saveState(); closeModal();
    toast(isEdit ? '수정 완료' : ((kind==='income'?'수입':'지출') + ' 기록 완료!'));
    renderDayPanel(); renderCalendar(); renderChart();
  });
}

function openWorkoutPicker(){
  if(state.workoutCats.length===0){
    toast('먼저 설정에서 카테고리를 추가해 주세요');
    return;
  }
  const [y,m,d] = selectedDate.split('-');
  const html = `
    <h3><span class="em">💪</span>운동 시작 · <span style="font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--ink-3)">${y}.${m}.${d}</span></h3>
    <div class="search-row">
      <input type="text" id="exSearch" placeholder="운동명 검색 (예: 벤치, 데드)" autocomplete="off"/>
      <button class="clearBtn" id="clearSearch">×</button>
    </div>
    <div id="pickerBody"></div>
    <button class="secondary-btn" onclick="closeModal()">취소</button>
  `;
  openModal(html);

  const searchInput = document.getElementById('exSearch');
  const clearBtn = document.getElementById('clearSearch');
  const body = document.getElementById('pickerBody');

  function renderPicker(q=''){
    const ql = q.trim().toLowerCase();
    clearBtn.classList.toggle('show', !!ql);
    const catsHTML = state.workoutCats.map(c=>{
      const exs = ql
        ? c.exercises.filter(e=>e.name.toLowerCase().includes(ql) || c.name.toLowerCase().includes(ql))
        : c.exercises;
      if(ql && exs.length===0) return '';  // hide empty categories when filtering
      return `
        <div style="margin-bottom:14px">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
            <span style="width:10px;height:10px;border-radius:50%;background:${c.color}"></span>
            <div style="font-weight:700;font-size:14px">${escapeHtml(c.name)}</div>
            <span style="font-size:11px;color:var(--ink-3);font-weight:500">${exs.length}개</span>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
            ${exs.map(e=>`
              <button class="ex-card" data-cat="${c.id}" data-ex="${e.id}">
                <span class="cat" style="background:${c.color};color:var(--ink)">${escapeHtml(c.name)}</span>
                <div class="nm">${escapeHtml(e.name)}</div>
              </button>
            `).join('') || `<div class="muted" style="font-size:12px;padding:4px;grid-column:span 2">종목을 추가해 주세요</div>`}
          </div>
        </div>`;
    }).filter(Boolean).join('');
    body.innerHTML = catsHTML || `<div class="empty" style="padding:30px 10px"><span class="emoji">🔍</span>"${escapeHtml(q)}"에 맞는 운동이 없어요.<br><span style="font-size:11px;color:var(--ink-3)">설정에서 새 운동을 추가해 보세요</span></div>`;

    body.querySelectorAll('button[data-cat][data-ex]').forEach(b=>{
      b.addEventListener('click', ()=>{
        const catId = b.dataset.cat, exId = b.dataset.ex;
        closeModal();
        openSessionModal(catId, exId);
      });
    });
  }
  renderPicker();

  searchInput.addEventListener('input', ()=>renderPicker(searchInput.value));
  clearBtn.addEventListener('click', ()=>{ searchInput.value=''; searchInput.focus(); renderPicker(''); });
  setTimeout(()=>searchInput.focus(), 240);
}

/* =======================================================
   SESSION MODAL (record sets) — supports EDIT
   ======================================================= */
let tempSession = null;
function openSessionModal(catId, exId, existingRecId=null){
  const cat = findById(state.workoutCats, catId);
  const ex  = cat?.exercises.find(e=>e.id===exId);
  if(!cat || !ex){ toast('카테고리/운동을 찾을 수 없습니다'); return; }

  let initial;
  if(existingRecId){
    const r = state.records.find(x=>x.id===existingRecId);
    initial = {date:r.date, time:r.time, sets:JSON.parse(JSON.stringify(r.sets||[]))};
  } else {
    initial = {date:selectedDate, time:fmtTime(new Date()), sets:[{w:'',r:''}]};
  }
  tempSession = initial;

  const html = `
    <h3>
      <span class="cat-pill" style="background:${cat.color};color:var(--ink)">${escapeHtml(cat.name)}</span>
      <span style="font-family:'Gaegu',cursive;font-size:22px">${escapeHtml(ex.name)}</span>
    </h3>
    <div class="field row">
      <div class="col"><label>날짜</label><input type="date" id="sDate" value="${initial.date}"/></div>
      <div class="col"><label>시간</label><input type="time" id="sTime" value="${initial.time}"/></div>
    </div>
    <div class="set-hdr"><span>세트</span><span>무게 (kg)</span><span>횟수</span><span></span></div>
    <div id="setsBox"></div>
    <button class="add-set" id="addSetBtn">+ 세트 추가</button>
    <button class="primary-btn" id="saveSessionBtn" style="margin-top:16px;background:${cat.color};color:var(--ink)">${existingRecId?'수정하기':'저장하기'}</button>
    <button class="secondary-btn" onclick="closeModal()">취소</button>
  `;
  openModal(html);

  function renderSets(){
    const box = document.getElementById('setsBox');
    box.innerHTML = tempSession.sets.map((s,i)=>`
      <div class="set-row">
        <div class="sn">${i+1}SET</div>
        <input type="number" step="0.5" inputmode="decimal" value="${s.w}" data-i="${i}" data-k="w" placeholder="0"/>
        <input type="number" inputmode="numeric" value="${s.r}" data-i="${i}" data-k="r" placeholder="0"/>
        <button class="x" data-del-set="${i}">×</button>
      </div>
    `).join('');
    box.querySelectorAll('input').forEach(inp=>{
      inp.addEventListener('input', ()=>{
        const i = Number(inp.dataset.i);
        tempSession.sets[i][inp.dataset.k] = inp.value;
      });
    });
    box.querySelectorAll('button[data-del-set]').forEach(b=>{
      b.addEventListener('click', ()=>{
        const i = Number(b.dataset.delSet);
        tempSession.sets.splice(i, 1);
        if(tempSession.sets.length===0) tempSession.sets.push({w:'',r:''});
        renderSets();
      });
    });
  }
  renderSets();

  document.getElementById('addSetBtn').addEventListener('click', ()=>{
    const prev = tempSession.sets[tempSession.sets.length-1];
    tempSession.sets.push({w: prev?prev.w:'', r: prev?prev.r:''});
    renderSets();
  });

  document.getElementById('saveSessionBtn').addEventListener('click', ()=>{
    const date = document.getElementById('sDate').value;
    const time = document.getElementById('sTime').value;
    const sets = tempSession.sets
      .map(s=>({w:Number(s.w)||0, r:Number(s.r)||0}))
      .filter(s=>s.w>0 && s.r>0);
    if(sets.length===0){ toast('세트를 최소 1개 입력해 주세요'); return; }
    if(existingRecId){
      const r = state.records.find(x=>x.id===existingRecId);
      r.date = date; r.time = time; r.sets = sets;
    } else {
      state.records.push({id:uid('r_'), kind:'workout', date, time, categoryId:catId, exerciseId:exId, sets});
    }
    saveState(); closeModal();
    toast('운동 기록 완료 💪');
    renderDayPanel(); renderCalendar(); renderChart();
    if(document.querySelector('.tab-btn.active').dataset.view==='workout') renderWorkout();
  });
}

/* =======================================================
   WORKOUT VIEW — list + filter + search
   ======================================================= */
let selectedCatId = null;
let workoutSearchQ = '';

function renderWorkout(){
  if(!selectedCatId && state.workoutCats[0]) selectedCatId = state.workoutCats[0].id;

  // today stats
  const todayS = todayStr();
  const todaySessions = state.records.filter(r=>r.kind==='workout' && r.date===todayS);
  const totalSets = todaySessions.reduce((a,s)=>a+(s.sets?.length||0), 0);
  document.getElementById('wHeroBig').textContent = totalSets;
  document.getElementById('wHeroSub').textContent = todaySessions.length + '개 운동 진행';

  // weight tracker
  renderWeight();

  // chips
  const chipsEl = document.getElementById('wChips');
  chipsEl.innerHTML = state.workoutCats.map(c=>`
    <button class="wo-chip ${selectedCatId===c.id?'active':''}" data-cat="${c.id}">
      <span class="dot" style="background:${c.color}"></span>${escapeHtml(c.name)}
    </button>
  `).join('');
  chipsEl.querySelectorAll('button').forEach(b=>{
    b.addEventListener('click', ()=>{
      selectedCatId = b.dataset.cat;
      renderWorkout();
    });
  });

  // exercise grid for selected cat
  const cat = findById(state.workoutCats, selectedCatId);
  const grid = document.getElementById('exGrid');
  if(!cat){
    grid.innerHTML = `<div class="empty" style="grid-column:span 2"><span class="emoji">🏋️</span>카테고리를 선택하세요</div>`;
  } else {
    const ql = workoutSearchQ.trim().toLowerCase();
    const exs = ql ? cat.exercises.filter(e=>e.name.toLowerCase().includes(ql)) : cat.exercises;
    grid.innerHTML = exs.map(e=>{
      const recs = state.records.filter(r=>r.kind==='workout' && r.exerciseId===e.id);
      const sessCount = recs.length;
      const maxW = recs.reduce((mx, r)=>{
        const m = (r.sets||[]).reduce((mm,s)=>Math.max(mm, +s.w||0), 0);
        return Math.max(mx, m);
      }, 0);
      return `
        <button class="ex-card" data-cat="${cat.id}" data-ex="${e.id}">
          <span class="cat" style="background:${cat.color};color:var(--ink)">${escapeHtml(cat.name)}</span>
          <div class="nm">${escapeHtml(e.name)}</div>
          <div class="stat">${sessCount}회 · 최고 ${maxW}kg</div>
        </button>`;
    }).join('') || `<div class="empty" style="grid-column:span 2;padding:20px"><span class="emoji">🔍</span>검색 결과가 없어요</div>`;
    grid.querySelectorAll('button').forEach(b=>{
      b.addEventListener('click', ()=>openSessionModal(b.dataset.cat, b.dataset.ex));
    });
  }

  // today's sessions
  const sessBox = document.getElementById('todaySessions');
  const countEl = document.getElementById('todaySessCount');
  const myTodaySess = [...todaySessions].sort((a,b)=>(b.time||'').localeCompare(a.time||''));
  countEl.textContent = myTodaySess.length + '개';
  if(myTodaySess.length===0){
    sessBox.innerHTML = `<div class="empty"><span class="emoji">🌱</span>오늘 아직 운동 기록이 없어요.<br>위에서 운동을 선택해 시작해 보세요!</div>`;
  } else {
    sessBox.innerHTML = myTodaySess.map(r=>{
      const c = findById(state.workoutCats, r.categoryId);
      const e = c?.exercises.find(x=>x.id===r.exerciseId);
      const setsHTML = (r.sets||[]).map((s,i)=>`<span class="chip">${i+1}S · ${s.w}kg × ${s.r}</span>`).join('');
      return `<div class="sess">
        <div class="hdr">
          <div class="tt">
            <span class="cat-pill" style="background:${c?.color||'#888'};color:var(--ink)">${escapeHtml(c?.name||'?')}</span>
            <span class="nm">${escapeHtml(e?.name||'?')}</span>
          </div>
          <div class="time">${r.time||''}</div>
        </div>
        <div class="sets">${setsHTML}</div>
        <div class="row-actions">
          <button class="edit" data-edit="${r.id}">편집</button>
          <button class="del" data-del-sess="${r.id}">삭제</button>
        </div>
      </div>`;
    }).join('');

    sessBox.querySelectorAll('button[data-edit]').forEach(b=>{
      b.addEventListener('click', ()=>{
        const r = state.records.find(x=>x.id===b.dataset.edit);
        if(r) openSessionModal(r.categoryId, r.exerciseId, r.id);
      });
    });
    sessBox.querySelectorAll('button[data-del-sess]').forEach(b=>{
      b.addEventListener('click', ()=>{
        if(!confirm('이 운동 기록을 삭제할까요?')) return;
        state.records = state.records.filter(x=>x.id!==b.dataset.delSess);
        saveState(); renderWorkout(); renderCalendar(); renderChart();
        toast('삭제됨');
      });
    });
  }

  // wire up search input (if not already wired)
  const searchEl = document.getElementById('workoutSearch');
  searchEl.value = workoutSearchQ;
  if(!searchEl.dataset.wired){
    searchEl.dataset.wired = '1';
    searchEl.addEventListener('input', ()=>{
      workoutSearchQ = searchEl.value;
      renderWorkout();
    });
  }
}

/* =======================================================
   WEIGHT TRACKER
   ======================================================= */
function renderWeight(){
  const todayS = todayStr();
  const weights = state.weights || {};

  // today's weight
  const todayW = weights[todayS];
  const todayInput = document.getElementById('wInput');
  if(todayInput && !todayInput.dataset.wired){
    todayInput.dataset.wired = '1';
    todayInput.addEventListener('keydown', e=>{
      if(e.key==='Enter'){ e.preventDefault(); document.getElementById('wSaveBtn').click(); }
    });
    document.getElementById('wSaveBtn').addEventListener('click', ()=>{
      const v = parseFloat(todayInput.value);
      if(!v || v<=0 || v>500){ toast('올바른 몸무게를 입력하세요'); return; }
      state.weights[todayS] = v;
      saveState();
      todayInput.value = '';
      toast(`오늘 몸무게 ${v}kg 저장`);
      renderWeight();
    });
  }

  // current / delta readout
  const keys = Object.keys(weights).sort();
  const latestKey = keys[keys.length-1];
  const latestV = latestKey ? weights[latestKey] : null;
  const prevKey = keys[keys.length-2];
  const prevV = prevKey ? weights[prevKey] : null;
  const statEl = document.getElementById('wStat');
  if(latestV != null){
    let deltaHTML = '';
    if(prevV != null){
      const d = latestV - prevV;
      if(d > 0) deltaHTML = `<div class="delta up">▲ ${d.toFixed(1)}kg</div>`;
      else if(d < 0) deltaHTML = `<div class="delta down">▼ ${Math.abs(d).toFixed(1)}kg</div>`;
      else deltaHTML = `<div class="delta" style="color:var(--ink-3)">— 변동 없음</div>`;
    }
    const [yy,mm,dd] = latestKey.split('-');
    statEl.innerHTML = `
      <div class="lbl">${latestKey===todayS?'오늘':`${mm}.${dd}`}</div>
      <div class="val">${latestV.toFixed(1)} kg</div>
      ${deltaHTML}`;
  } else {
    statEl.innerHTML = `<div class="lbl">아직 기록 없음</div><div class="val" style="color:var(--ink-3);font-size:13px">— kg</div>`;
  }

  // chart
  const svg = document.getElementById('weightChart');
  const labelsEl = document.getElementById('wDateLabels');
  svg.innerHTML = ''; labelsEl.innerHTML = '';
  if(keys.length === 0){
    svg.outerHTML = `<div class="empty-small" id="weightChart" style="padding:16px;text-align:center;font-size:12px;color:var(--ink-3)">몸무게를 입력하면 차트가 생겨요 📊</div>`;
    return;
  }
  // ensure svg exists (in case it was replaced)
  let svgEl = document.getElementById('weightChart');
  if(svgEl.tagName !== 'svg'){
    const newSvg = document.createElementNS('http://www.w3.org/2000/svg','svg');
    newSvg.id = 'weightChart';
    newSvg.setAttribute('class','weight-chart');
    newSvg.setAttribute('viewBox','0 0 400 120');
    newSvg.setAttribute('preserveAspectRatio','none');
    svgEl.replaceWith(newSvg);
    svgEl = newSvg;
  }

  const pts = keys.map(k=>({date:k, v:weights[k]}));
  const W=400, H=120, PADL=6, PADR=6, PADT=8, PADB=8;
  const vs = pts.map(p=>p.v);
  let yMin = Math.min(...vs), yMax = Math.max(...vs);
  if(yMin===yMax){ yMin -= 1; yMax += 1; }
  const padY = (yMax-yMin)*0.2;
  yMin -= padY; yMax += padY;

  const x = i => PADL + (W-PADL-PADR) * (pts.length===1 ? 0.5 : i/(pts.length-1));
  const y = v => PADT + (H-PADT-PADB) * (1 - (v-yMin)/(yMax-yMin));

  let d = `M ${x(0)} ${y(pts[0].v)}`;
  for(let i=1;i<pts.length;i++){
    const p0 = [x(i-1), y(pts[i-1].v)];
    const p1 = [x(i),   y(pts[i].v)];
    const mx = (p0[0]+p1[0])/2;
    d += ` C ${mx} ${p0[1]}, ${mx} ${p1[1]}, ${p1[0]} ${p1[1]}`;
  }
  const dArea = d + ` L ${x(pts.length-1)} ${H-PADB} L ${x(0)} ${H-PADB} Z`;

  let dots = '';
  pts.forEach((p,i)=>{
    dots += `<circle cx="${x(i)}" cy="${y(p.v)}" r="2.5" fill="#fff" stroke="#7A5BBF" stroke-width="1.5"/>`;
  });
  const last = pts[pts.length-1];
  dots += `<circle cx="${x(pts.length-1)}" cy="${y(last.v)}" r="4" fill="#7A5BBF"/>`;
  dots += `<circle cx="${x(pts.length-1)}" cy="${y(last.v)}" r="8" fill="#7A5BBF" opacity=".2"/>`;

  const wGradId = 'wg_' + Math.random().toString(36).slice(2,6);
  svgEl.innerHTML = `
    <defs><linearGradient id="${wGradId}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7A5BBF" stop-opacity=".28"/>
      <stop offset="100%" stop-color="#7A5BBF" stop-opacity="0"/>
    </linearGradient></defs>
    <path d="${dArea}" fill="url(#${wGradId})"/>
    <path d="${d}" fill="none" stroke="#7A5BBF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    ${dots}`;

  // start/end labels only
  if(pts.length >= 2){
    const [ay,am,ad] = pts[0].date.split('-');
    const [by,bm,bd] = pts[pts.length-1].date.split('-');
    labelsEl.innerHTML = `<span>${ay}.${am}.${ad}</span><span>${by}.${bm}.${bd}</span>`;
  } else {
    const [yy,mm,dd] = pts[0].date.split('-');
    labelsEl.innerHTML = `<span>${yy}.${mm}.${dd}</span><span></span>`;
  }
}

document.getElementById('resetBtn').addEventListener('click', ()=>{
  if(!confirm('모든 데이터가 영구 삭제됩니다. 계속할까요?')) return;
  if(!confirm('정말 모든 수입·지출·운동 기록을 지울까요?')) return;
  localStorage.removeItem(STORAGE_KEY);
  state = loadState();
  renderSettings(); renderChart(); renderCalendar();
  toast('초기화 완료');
});

/* ---------- utils ---------- */
function findById(arr, id){ return arr.find(x=>x.id===id); }
function escapeHtml(s){
  return String(s==null?'':s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

/* ---------- initial render ---------- */
// theme apply
function applyTheme(theme){
  document.documentElement.dataset.theme = theme;
  const btn = document.getElementById('themeToggle');
  if(btn) btn.textContent = theme==='dark' ? '☀️' : '🌙';
}
applyTheme(state.settings.theme || 'light');
document.getElementById('themeToggle').addEventListener('click', ()=>{
  const cur = state.settings.theme || 'light';
  const next = cur==='dark' ? 'light' : 'dark';
  state.settings.theme = next;
  saveState();
  applyTheme(next);
});

renderChart();
renderCalendar();
